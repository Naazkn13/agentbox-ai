# AgentKit Skill Registry v0.5.0
# 50 skills across 12 categories with role bundle tags.
# Fields:
#   id             — unique identifier (used in hooks + logs)
#   name           — human-readable name
#   category       — must match a key in classifier.CATEGORIES
#   priority       — 1=core (always preferred), 2=supplemental, 3=reference
#   path           — relative path to SKILL.md file
#   level1_tokens  — approximate tokens in Level 1 section
#   level2_tokens  — approximate tokens in Level 2 section
#   level3_tokens  — approximate tokens in Level 3 section
#   platforms      — list of supported platforms
#   keywords       — extra keywords to boost this skill's selection score
#   effectiveness  — 0.0–1.0 (updated from marketplace ratings)
#   bundles        — role bundles this skill belongs to

# ── Bundles ────────────────────────────────────────────────────────────────────
# backend-pro      Python/Go backend, REST/gRPC APIs, SQL/NoSQL, auth, devops
# frontend-wizard  React/Vue/Next.js, CSS, state, a11y, E2E testing
# full-stack-hero  All 50 skills
# ai-engineer      LLM prompting, RAG, agents, evals, function calling
# devops-master    Docker, K8s, CI/CD, Terraform, monitoring, nginx
# data-scientist   Pandas, ML pipelines, data visualization, SQL
# mobile-dev       React Native, Flutter, REST APIs, auth
# ──────────────────────────────────────────────────────────────────────────────

