description: For hardcoded secrets, .env files, Vault/AWS/GCP secret managers, secret
  rotation, and credential leak detection
name: agentkit-secrets-management
priority: 1
prompt: "## Secrets Management \xE2\u20AC\u201D Core Instructions\n\n1. **Never hardcode\
  \ secrets** \xE2\u20AC\u201D no API keys, passwords, tokens, or connection strings\
  \ in source code, ever; use environment variables or a secrets manager.\n2. **Add\
  \ .env to .gitignore immediately** \xE2\u20AC\u201D also `.env.local`, `.env.production`;\
  \ provide a `.env.example` with placeholder values.\n3. **Use a secrets manager\
  \ in production** \xE2\u20AC\u201D AWS Secrets Manager, GCP Secret Manager, or HashiCorp\
  \ Vault instead of environment variables on the host.\n4. **Rotate secrets on suspected\
  \ exposure** \xE2\u20AC\u201D invalidate the old secret first, then update all consumers;\
  \ treat rotation as a drill to automate.\n5. **Install pre-commit hooks for secret\
  \ scanning** \xE2\u20AC\u201D `gitleaks` or `detect-secrets` must block commits\
  \ containing high-entropy strings or known patterns.\n6. **Scope secrets minimally**\
  \ \xE2\u20AC\u201D each service gets its own secret with least-privilege; never\
  \ share a single root credential across services.\n7. **Audit secret access** \xE2\
  \u20AC\u201D enable CloudTrail / Vault audit logs; alert on unusual access patterns\
  \ or reads outside deployment windows."
trigger:
  keywords:
  - secrets-management
version: 1.0.0
