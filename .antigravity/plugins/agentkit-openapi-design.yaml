description: "For designing OpenAPI 3.x specs \xE2\u20AC\u201D paths, schemas, auth,\
  \ status codes, and client generation"
name: agentkit-openapi-design
priority: 1
prompt: "## OpenAPI Design \xE2\u20AC\u201D Core Instructions\n\n1. **Use OpenAPI\
  \ 3.x (not Swagger 2.0):** declare `openapi: \"3.1.0\"` and use `components/schemas`\
  \ for all reusable models \xE2\u20AC\u201D never inline complex schemas twice.\n\
  2. **Define all reusable types in components:** schemas, parameters, responses,\
  \ request bodies, and security schemes all belong under `components`, then referenced\
  \ with `$ref`.\n3. **Every response must have a schema:** document 2xx, 4xx, and\
  \ 5xx responses for every operation \xE2\u20AC\u201D do not leave responses undocumented.\n\
  4. **Use `required` arrays and `nullable` explicitly:** be exact about which fields\
  \ are required and which can be null; never leave it ambiguous.\n5. **Apply security\
  \ at the global level, override per-operation:** set a global `security` block,\
  \ then override individual operations (e.g., login endpoint has empty `security:\
  \ []`).\n6. **Use `operationId` on every endpoint:** name it `verbNoun` (e.g., `createUser`,\
  \ `listOrders`) \xE2\u20AC\u201D this drives generated SDK method names.\n7. **Validate\
  \ the spec before committing:** run `npx @redocly/cli lint openapi.yaml` or `npx\
  \ swagger-parser validate` in CI to catch broken `$ref`s and schema errors early."
trigger:
  keywords:
  - openapi-design
version: 1.0.0
