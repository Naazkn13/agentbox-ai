description: For writing and organising pytest tests with fixtures, mocks, and coverage
name: agentkit-pytest-workflow
priority: 1
prompt: "## Pytest Workflow \xE2\u20AC\u201D Core Instructions\n\n1. **One assertion\
  \ per test concept** \xE2\u20AC\u201D each test should have a single reason to fail.\
  \ Multiple unrelated assertions in one test make failures ambiguous.\n2. **Use fixtures\
  \ for setup/teardown, never `setUp`/`tearDown` methods** \xE2\u20AC\u201D fixtures\
  \ are composable and scope-controlled; class-based test setup is the unittest way,\
  \ not the pytest way.\n3. **Parametrize to avoid copy-pasting tests** \xE2\u20AC\
  \u201D if two tests differ only in input/output values, use `@pytest.mark.parametrize`.\n\
  4. **Put shared fixtures in `conftest.py`** \xE2\u20AC\u201D pytest discovers it\
  \ automatically; you never import from it. Place it at the package boundary that\
  \ needs the fixture.\n5. **Mock at the boundary where it is used, not where it is\
  \ defined** \xE2\u20AC\u201D patch `myapp.services.requests.get`, not `requests.get`.\n\
  6. **Use `pytest-mock`'s `mocker` fixture over `unittest.mock.patch` as a decorator**\
  \ \xE2\u20AC\u201D `mocker` auto-resets after each test; decorators require careful\
  \ ordering.\n7. **Run coverage with `--cov` and check branch coverage** \xE2\u20AC\
  \u201D line coverage hides untested conditional branches; use `--cov-branch`."
trigger:
  keywords:
  - pytest-workflow
version: 1.0.0
